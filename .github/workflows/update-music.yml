name: Update music stats

on:
  schedule:
    # Every 30 minutes — matches the recent-tracks display window so newly
    # added items can be spread across "now → 30m ago" until the next refresh.
    # Commits only when the snapshot changed; the resulting push triggers
    # deploy-pages.yml so the live site reflects new data without waiting
    # for a manual rebuild.
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - scripts/fetch-music.ts
      - .github/workflows/update-music.yml
      - package.json
      - package-lock.json

permissions:
  contents: write

concurrency:
  group: update-music
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch stats.fm snapshot
        run: npm run fetch:music
        env:
          STATSFM_USER: afr

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/music.json index.html images
          if git diff --staged --quiet; then
            echo "snapshot unchanged"
          else
            git commit -m "chore(music): refresh stats.fm snapshot"
            git push
          fi
