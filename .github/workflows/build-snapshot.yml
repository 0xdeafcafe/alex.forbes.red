name: Build snapshot

on:
  schedule:
    # Every 30 minutes — matches the recent-tracks display window so newly
    # added items can be spread across "now → 30m ago" until the next refresh.
    # Commits only when the snapshot or pre-rendered HTML changed; the push
    # triggers deploy-pages.yml so the live site reflects new data without
    # waiting for a manual rebuild.
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - scripts/**
      - data/content.json
      - .github/workflows/build-snapshot.yml
      - package.json
      - package-lock.json

permissions:
  contents: write

concurrency:
  group: build-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Full history so `git commit --amend` has the real parent chain.
        # Default fetch-depth:1 would make the amend's parent reference
        # invisible locally; in our incident that produced a root commit
        # on push.
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch + pre-render
        run: npm run build
        env:
          STATSFM_USER: afr

      - name: Commit & push if changed
        env:
          # Quoted so YAML doesn't see `[bot]` as a flow sequence.
          BOT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "$BOT_EMAIL"
          git add data/snapshot.json data.json index.html client.js images \
                  collection music projects words photography
          if git diff --staged --quiet; then
            echo "snapshot unchanged"
            exit 0
          fi

          PREV_SHA=$(git rev-parse HEAD)
          PREV_AUTHOR=$(git log -1 --pretty=%ae)
          PREV_SUBJECT=$(git log -1 --pretty=%s)

          # Amend onto the previous bot snapshot when the tip is one — keeps
          # the repo from ballooning ~48 commits/day. Safety guard: bail out
          # of the amend path if HEAD has no parent (would orphan history).
          if [ "$PREV_AUTHOR" = "$BOT_EMAIL" ] \
             && [ "$PREV_SUBJECT" = "chore: refresh snapshot" ] \
             && git rev-parse HEAD^ >/dev/null 2>&1; then
            PARENT=$(git rev-parse HEAD^)
            echo "[snapshot] amending $PREV_SHA (parent $PARENT)"
            git commit --amend -m "chore: refresh snapshot"
            NEW_PARENT=$(git rev-parse HEAD^ 2>/dev/null || echo "")
            if [ "$NEW_PARENT" != "$PARENT" ]; then
              echo "ERROR: amend changed parent ($PARENT -> $NEW_PARENT), aborting"
              exit 1
            fi
            git push --force-with-lease=master:"$PREV_SHA" origin master
          else
            git commit -m "chore: refresh snapshot"
            git push origin master
          fi
