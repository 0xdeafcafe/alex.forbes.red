name: Build snapshot

on:
  schedule:
    # Every 30 minutes — matches the recent-tracks display window so newly
    # added items can be spread across "now → 30m ago" until the next refresh.
    # Commits only when the snapshot or pre-rendered HTML changed; the push
    # triggers deploy-pages.yml so the live site reflects new data without
    # waiting for a manual rebuild.
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - scripts/**
      - data/content.json
      - .github/workflows/build-snapshot.yml
      - package.json
      - package-lock.json

permissions:
  contents: write

concurrency:
  group: build-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch + pre-render
        run: npm run build
        env:
          STATSFM_USER: afr

      - name: Commit & push if changed
        env:
          BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "$BOT_EMAIL"
          git add data/snapshot.json data.json index.html client.js images \
                  collection music projects words photography
          if git diff --staged --quiet; then
            echo "snapshot unchanged"
            exit 0
          fi
          # If the tip commit was the bot's previous snapshot refresh, amend
          # onto it instead of stacking a new one — keeps the repo from
          # ballooning by ~48 commits/day.
          if [ "$(git log -1 --pretty=%ae)" = "$BOT_EMAIL" ] \
             && [ "$(git log -1 --pretty=%s)" = "chore: refresh snapshot" ]; then
            echo "[snapshot] amending previous bot commit"
            git commit --amend -m "chore: refresh snapshot"
            git push --force-with-lease
          else
            git commit -m "chore: refresh snapshot"
            git push
          fi
